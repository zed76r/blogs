name: Sign Commits

on:
  push:
    branches-ignore:
      - main

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Re-create unsigned commits via GitHub API (produces verified commits)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');

            // Get the base SHA (main branch)
            const { data: mainRef } = await github.rest.git.getRef({
              owner, repo, ref: 'heads/main'
            });
            const mainSha = mainRef.object.sha;

            // Get commits on this branch not in main
            const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
              owner, repo,
              basehead: `${mainSha}...${context.sha}`
            });

            if (comparison.commits.length === 0) {
              console.log('No commits to process');
              return;
            }

            // Check if all commits are already verified
            const allVerified = comparison.commits.every(
              c => c.commit.verification && c.commit.verification.verified
            );
            if (allVerified) {
              console.log('All commits are already verified — nothing to do');
              return;
            }

            console.log(`Found ${comparison.commits.length} commit(s), re-creating as verified...`);

            // Re-create each commit via the GitHub API (API commits are auto-signed/verified)
            let parentSha = mainSha;
            let lastSha = null;

            for (const commit of comparison.commits) {
              const { data: newCommit } = await github.rest.git.createCommit({
                owner, repo,
                message: commit.commit.message,
                tree: commit.commit.tree.sha,
                parents: [parentSha],
                author: {
                  name: commit.commit.author.name,
                  email: commit.commit.author.email,
                  date: commit.commit.author.date
                },
                committer: {
                  name: commit.commit.committer.name,
                  email: commit.commit.committer.email,
                  date: commit.commit.committer.date
                }
              });

              console.log(`  ${commit.sha.slice(0, 7)} → ${newCommit.sha.slice(0, 7)} (verified)`);
              parentSha = newCommit.sha;
              lastSha = newCommit.sha;
            }

            // Force-update the branch ref to the re-created (verified) commits
            if (!lastSha) {
              console.log('No commits were re-created; branch ref unchanged');
              return;
            }
            await github.rest.git.updateRef({
              owner, repo,
              ref: `heads/${branch}`,
              sha: lastSha,
              force: true
            });

            console.log(`Branch '${branch}' updated to ${lastSha} — all commits are now verified`);
