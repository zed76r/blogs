#---------------------------
# Hexo Theme Fluid - Site Config Override
# https://hexo.fluid-dev.com/docs/guide/
#---------------------------

# 暗色模式默认开启
# Dark mode default
dark_mode:
  enable: true
  default: dark

# 导航栏
# Navigation bar
navbar:
  blog_title: "Zedd.dev"
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "projects", link: "https://github.com/zed76r", icon: "iconfont icon-github", name: "Projects" }

# 关闭搜索（避免需要额外插件）
# Disable search to avoid requiring extra plugins
search:
  enable: false

# 代码块配置，使用 highlightjs 深色风格
# Code block configuration using highlightjs dark style
code:
  copy_btn: true
  language:
    enable: true
    default: "TEXT"
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github"
      style_dark: "github-dark"

# 关闭不必要的动效，保持简洁
# Disable unnecessary animations
fun_features:
  typing:
    enable: false
  anchorjs:
    enable: true
    element: h2,h3,h4
    placement: left
    visible: hover
    icon: ""
  progressbar:
    enable: true
    height_px: 2
    color: "#29d"
    options: { showSpinner: false, trickleSpeed: 100 }

# 颜色配置（深色模式主色调）
# Color configuration (dark mode primary colors)
color:
  body_bg_color: "#eee"
  body_bg_color_dark: "#181c27"
  navbar_bg_color: "#2f4154"
  navbar_bg_color_dark: "#1f2d3d"
  navbar_text_color: "#fff"
  navbar_text_color_dark: "#d0d0d0"
  subtitle_color: "#fff"
  subtitle_color_dark: "#d0d0d0"
  text_color: "#3c4858"
  text_color_dark: "#c4c6c9"
  sec_text_color: "#718096"
  sec_text_color_dark: "#a7b1c2"
  board_color: "#fff"
  board_color_dark: "#252d38"
  post_text_color: "#2c3e50"
  post_text_color_dark: "#c4c6c9"
  post_heading_color: "#1a202c"
  post_heading_color_dark: "#e0e0e0"
  post_link_color: "#0366d6"
  post_link_color_dark: "#58a6ff"
  link_hover_color: "#30a9de"
  link_hover_color_dark: "#79c0ff"
  link_hover_bg_color: "#f8f9fa"
  link_hover_bg_color_dark: "#1f3144"
  line_color: "#eaecef"
  line_color_dark: "#3b4554"
  scrollbar_color: "#c4c6c9"
  scrollbar_color_dark: "#4a5568"
  scrollbar_hover_color: "#a6a6a6"
  scrollbar_hover_color_dark: "#718096"
  button_bg_color: "transparent"
  button_hover_bg_color: "#f2f3f5"
  button_hover_bg_color_dark: "#2d3748"

# 首页
# Home page
index:
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.5
  slogan:
    enable: true
    text: "Zed's blogs"
  auto_excerpt:
    enable: true
  post_url_target: _self
  post_meta:
    date: true
    category: false
    tag: true

# 文章页
# Post page
post:
  banner_img: /img/default.png
  banner_img_height: 50
  banner_mask_alpha: 0.5
  meta:
    author:
      enable: false
    date:
      enable: true
      format: "YYYY-MM-DD"
    wordcount:
      enable: true
    min2read:
      enable: true
      awl: 2
      wpm: 200
    views:
      enable: false
  updated:
    enable: false
  toc:
    enable: true
    placement: right
    width: 240
    collapse_depth: 0

# 页脚
# Footer
footer:
  content: '
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener"><span>Hexo</span></a>
    &nbsp;|&nbsp;
    <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener"><span>Fluid</span></a>
  '
  statistics:
    enable: false
  beian:
    enable: false

# 关于页面（如果有的话）
# About page
about:
  banner_img: /img/default.png
  banner_img_height: 60
  banner_mask_alpha: 0.5
  avatar: https://www.gravatar.com/avatar/?s=200&d=mp
  name: "Zed"
  intro: "Zed's blogs"
  social:
    - { icon: "iconfont icon-github-fill", link: "https://github.com/zed76r", tip: "GitHub" }
    - { icon: "iconfont icon-mail-fill", link: "mailto:zed@zedd.dev", tip: "Email" }
